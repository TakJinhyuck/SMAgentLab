services:
  # ─── PostgreSQL + pgvector ───────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opsdb}
      POSTGRES_USER: ${POSTGRES_USER:-ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ops1234}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ops} -d ${POSTGRES_DB:-opsdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis (Semantic Cache) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ops-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data

  # ─── FastAPI Backend ─────────────────────────────────────────
  backend:
    image: smagentlab-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ops-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 인프라/시크릿 (.env에서 주입)
      DATABASE_URL: postgresql://${POSTGRES_USER:-ops}:${POSTGRES_PASSWORD:-ops1234}@postgres:5432/${POSTGRES_DB:-opsdb}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      INHOUSE_LLM_URL: ${INHOUSE_LLM_URL:-}
      INHOUSE_LLM_API_KEY: ${INHOUSE_LLM_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-key-in-production}
      FERNET_SECRET_KEY: ${FERNET_SECRET_KEY:-}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-1111}
      REDIS_URL: redis://ops-redis:6379/0
      # 나머지 설정은 backend/core/config.py 코드 기본값 사용
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      # Sentence-Transformers 모델 캐시를 호스트와 공유 (재다운로드 방지)
      - model-cache:/root/.cache/huggingface

  # ─── React Frontend (nginx) ───────────────────────────────────
  frontend:
    image: smagentlab-frontend:latest
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: ops-frontend
    restart: unless-stopped
    ports:
      - "8501:80"
    depends_on:
      - backend

volumes:
  pgdata:
  model-cache:
  redisdata:
