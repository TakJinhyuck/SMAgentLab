services:
  # ─── PostgreSQL + pgvector ───────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opsdb}
      POSTGRES_USER: ${POSTGRES_USER:-ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ops1234}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ops} -d ${POSTGRES_DB:-opsdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ops-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ops}:${POSTGRES_PASSWORD:-ops1234}@postgres:5432/${POSTGRES_DB:-opsdb}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-exaone3.5:7.8b}
      INHOUSE_LLM_URL: ${INHOUSE_LLM_URL:-}
      INHOUSE_LLM_API_KEY: ${INHOUSE_LLM_API_KEY:-}
      INHOUSE_LLM_MODEL: ${INHOUSE_LLM_MODEL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-paraphrase-multilingual-mpnet-base-v2}
      VECTOR_DIM: ${VECTOR_DIM:-768}
      DEFAULT_TOP_K: ${DEFAULT_TOP_K:-5}
      DEFAULT_W_VECTOR: ${DEFAULT_W_VECTOR:-0.7}
      DEFAULT_W_KEYWORD: ${DEFAULT_W_KEYWORD:-0.3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Sentence-Transformers 모델 캐시를 호스트와 공유 (재다운로드 방지)
      - model-cache:/root/.cache/huggingface

  # ─── Streamlit Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ops-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    depends_on:
      - backend

volumes:
  pgdata:
  model-cache:
