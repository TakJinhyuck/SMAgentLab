<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <g transform="translate(50,50)">
    <!-- 6 petals rotated 60 degrees apart -->
    <g fill="#E31937">
      <ellipse cx="0" cy="-18" rx="10" ry="18" transform="rotate(0)"/>
      <ellipse cx="0" cy="-18" rx="10" ry="18" transform="rotate(60)"/>
      <ellipse cx="0" cy="-18" rx="10" ry="18" transform="rotate(120)"/>
      <ellipse cx="0" cy="-18" rx="10" ry="18" transform="rotate(180)"/>
      <ellipse cx="0" cy="-18" rx="10" ry="18" transform="rotate(240)"/>
      <ellipse cx="0" cy="-18" rx="10" ry="18" transform="rotate(300)"/>
    </g>
    <!-- Center cutout to create petal separation -->
    <circle cx="0" cy="0" r="6" fill="#1E293B"/>
  </g>
</svg>
